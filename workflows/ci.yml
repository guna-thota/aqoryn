name: Aqoryn CI + Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:  "pages"
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. AI Agent tests (mocked — no API key needed) ─────────────────────────
  test-ai-agent:
    name: "AI Agent tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-agent/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test -- --coverage --forceExit
        env:
          ANTHROPIC_API_KEY: "sk-ant-test-key-mocked-in-tests"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ai-agent-coverage
          path: ai-agent/coverage/

  # ── 2. Frontend type check + build ─────────────────────────────────────────
  build-frontend:
    name: "Frontend build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_RPC_URL:          "https://api.devnet.solana.com"
          NEXT_PUBLIC_SOLANA_NETWORK:   "devnet"
          NEXT_PUBLIC_NFT_STORAGE_TOKEN: "demo-token"
          AI_AGENT_URL:                 "https://aqoryn-ai-agent.railway.app"
          # Disable telemetry in CI
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  # ── 3. Deploy to GitHub Pages ───────────────────────────────────────────────
  deploy-pages:
    name: "Deploy to GitHub Pages"
    needs: [test-ai-agent, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id:   deployment
        uses: actions/deploy-pages@v4
